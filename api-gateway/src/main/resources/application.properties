spring.application.name=api-gateway

# The client-simulator sends all requests to http://localhost:8080/api
# so the gateway MUST occupy port 8080.
server.port=8080

# ----------------------------------------------------------------
# Consistent-Hash Ring: Primary Node URLs
#
# Add more primary nodes here as comma-separated values.
# The ConsistentHashRingService will distribute keys across all
# of them using MD5-based virtual nodes.
# ----------------------------------------------------------------
gateway.primary-nodes=http://localhost:8081

# Number of virtual nodes per real node on the hash ring.
# Higher value = more even distribution.
gateway.virtual-nodes=150
